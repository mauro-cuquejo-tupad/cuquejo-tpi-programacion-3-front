<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dashboard</title>
    <link rel="stylesheet" href="../../../style.css">
</head>

<body>
    <header>
        <h1>Food Store</h1>
        <div class="header-bar">
            <nav>
                <ul>
                    <li><a href="#" class="nav-link seleccionado" data-tab="tab-dashboard">Dashboard</a></li>
                    <li><a href="../products/products.html" class="nav-link">Productos</a></li>
                    <li><a href="../categories/categories.html" class="nav-link">Categorías</a></li>
                    <li><a href="../orders/orders.html" class="nav-link">Pedidos</a></li>
                </ul>
            </nav>
            <button id="logoutButton">Logout</button>
        </div>
    </header>

    <hr>
    <h1>Dashboard</h1>
    <main class="admin-main">
        <div id="tab-dashboard" class="admin-tab-content">
            <div class="admin-dashboard-header">

                <button class="btn-accion" onclick="window.location.href = '../products/products.html'">Gestionar
                    Productos</button>
            </div>
            <section class="dashboard-cards">
                <div class="card">
                    <h3>Total Categorias</h3>
                    <p id="total-categorias">0</p>
                    <input id="gestionar-Categorias" type="button" class="btn-accion" value="Gestionar">
                </div>
                <div class="card">
                    <h3>Total Productos</h3>
                    <p id="total-productos">0</p>
                    <input id="gestionar-productos" type="button" class="btn-accion" value="Gestionar">
                </div>
                <div class="card">
                    <h3>Total Pedidos</h3>
                    <p id="total-pedidos">0</p>
                    <input id="gestionar-pedidos" type="button" class="btn-accion" value="Gestionar">
                </div>
                <div class="card">
                    <h3>Productos Activos</h3>
                    <p id="productos-activos">0</p>
                </div>
            </section>



            <footer>
                <p>&copy; 2026 Food Store - Todos los derechos reservados</p>
            </footer>
            <script type="module" src="./adminHome.ts"></script>
</body>

</html>
