<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart FoodStore</title>
    <link rel="stylesheet" href="../../../style.css">
</head>

<body>
    <header>
        <h1>Food Store</h1>
        <div class="header-bar">
            <nav>
                <ul>
                    <li><a class="nav-link" href="../home/home.html">Inicio</a></li>
                    <li><a class="nav-link" href="../../client/orders/orders.html">Mis Pedidos</a></li>
                    <li><a id="a-carrito" class="nav-link seleccionado" href="#"> <span
                                class="carrito-badge"></span>Carrito </a></li>
                </ul>
            </nav>
            <button id="logoutButton">Logout</button>
        </div>
    </header>

    <main>
        <div id="carrito">
        </div>

        <!-- Modal de Checkout -->
        <div id="checkout-modal" class="modal-checkout-overlay">
            <div class="modal-checkout-container">
                <div class="modal-checkout-header">
                    <h2>Confirmar Pedido</h2>
                    <button type="button" id="btn-cerrar-checkout" class="btn-cerrar-modal">&times;</button>
                </div>
                <form id="form-checkout" class="modal-checkout-form">
                    <div class="form-group-checkout">
                        <label for="checkout-tel">Celular / Teléfono *</label>
                        <input type="tel" id="checkout-tel" required placeholder="Ej: 1123456789">
                    </div>
                    <div class="form-group-checkout">
                        <label for="checkout-dir">Dirección de Entrega *</label>
                        <input type="text" id="checkout-dir" required placeholder="Ej: Av. Siempreviva 742">
                    </div>
                    <div class="form-group-checkout">
                        <label for="checkout-pago">Método de Pago *</label>
                        <select id="checkout-pago" required>
                            <option value="" disabled selected>Seleccione un método</option>
                            <option value="EFECTIVO">Efectivo (en entrega)</option>
                            <option value="TARJETA">Tarjeta de Crédito / Débito</option>
                            <option value="TRANSFERENCIA">Transferencia Bancaria</option>
                        </select>
                    </div>
                    <div class="form-group-checkout">
                        <label for="checkout-notas">Notas / Observaciones (opcional)</label>
                        <textarea id="checkout-notas"
                            placeholder="Ej: Timbre B, dejar en recepción, sin cebolla, etc."></textarea>
                    </div>

                    <div class="checkout-summary">
                        <h3>Resumen del Pedido</h3>
                        <div id="checkout-summary-items"></div>
                        <div class="checkout-summary-item">
                            <span>Costo de Envío:</span>
                            <span id="checkout-summary-shipping">$500</span>
                        </div>
                        <div class="checkout-summary-total">
                            <span>Total a Pagar:</span>
                            <span id="checkout-summary-total">$0</span>
                        </div>
                    </div>

                    <div class="modal-checkout-buttons">
                        <button type="button" id="btn-checkout-cancelar" class="btn-checkout-cancelar">Cancelar</button>
                        <button type="submit" class="btn-checkout-confirmar">Confirmar Compra</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Food Store - Todos los derechos reservados</p>
        <p>Contacto: <a href="mailto:info@foodstore.com">info@foodstore.com</a></p>
    </footer>
</body>
<script type="module" src="./cart.ts"></script>

</html>
