<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio FoodStore</title>
    <link rel="stylesheet" href="../../../style.css">
</head>

<body>
    <header>

        <h1> Food Store</h1>
        <div class="header-bar">
            <nav>
                <ul>
                    <li><a class="nav-link seleccionado" href="#">Inicio</a></li>
                    <li><a class="nav-link" href="../../client/orders/orders.html">Mis Pedidos</a></li>
                    <li><a id="a-carrito" class="nav-link" href="../cart/cart.html"> <span class="carrito-badge"></span>
                            Carrito </a></li>
                </ul>
            </nav>
            <button id="logoutButton">Salir</button>
        </div>
    </header>
    <section class="store-layout">
        <aside>
            <div class="toggle-categorias">
                <button id="btn-toggle-categorias" class="btn-toggle-categorias">☰</button>
                <h1>Categorías</h1>
            </div>
            <ul id="lista-categorias">
            </ul>
        </aside>

        <main>
            <div class="buscar-productos" id="div-buscar-productos">
                <input type="text" id="txt_buscar_productos" name="txt_buscar_productos"
                    placeholder="Buscar productos...">

                <select id="select-ordenar" class="ordenar-productos">
                    <option value="defecto">Ordenar por...</option>
                    <option value="precio-asc">Precio: Menor a Mayor</option>
                    <option value="precio-desc">Precio: Mayor a Menor</option>
                    <option value="alfa-asc">Nombre: A-Z</option>
                </select>
            </div>

            <section id="productos-destacados">
                <h1>Productos Destacados</h1>
                <section id="contenedor-productos">

                </section>
            </section>
        </main>
    </section>

    <footer>
        <p>&copy; 2026 Food Store - Todos los derechos reservados</p>
        <p>Contacto: <a href="mailto:info@foodstore.com">info@foodstore.com</a></p>
    </footer>
    <script type="module" src="./home.ts"></script>
</body>

</html>
