<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../../../style.css">
</head>

<body>
    <div class="container">
        <form id="form">
            <h1>Food Store</h1>
            <h2>Iniciar Sesión</h2>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" autocomplete="off" placeholder="example@example.com">

            <label for="password">password</label>
            <input type="password" id="password" name="password" autocomplete="off" placeholder="********">

            <button type="submit">Ingresar</button>
            <div>
                ¿No tenés cuenta? <a href="../registro/registro.html">Registrate</a>
            </div>
        </form>

    </div>

    <script type="module" src="./login.ts"></script>
</body>

</html>
